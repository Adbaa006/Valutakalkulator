<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Valutakalkulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="kort">
      <header>
        <h1>Valutakalkulator</h1>
      </header>
      <main>
        <input type="number" id="belop" placeholder="Beløp">
        <div class="valuta-rad">
          <select id="fraValuta" ></select>
          <span>→</span>
          <select id="tilValuta"></select>
        </div>
        <button id="konverter">Konverter</button>

        <p id="resultat"></p>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
