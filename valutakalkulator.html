<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Valutakalkulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="kort">
      <header>
        <h1>Valutakalkulator</h1>
      </header>
      <main>
        <input type="number" id="belop" placeholder="Beløp">
        <div class="valuta-rad">
          <input list="valutaListe" id="fraValuta" placeholder="Fra valuta (f. eks NOK)">
          <span>→</span>
          <input list="valutaListe" id="tilValuta" placeholder="Til valuta (f. eks USD)">
          <datalist id="valutaListe"></datalist>
        </div>
        <button id="konverter">Konverter</button>
        <div class="svar">
          <p id="resultat"></p>
        </div>
      </main>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
